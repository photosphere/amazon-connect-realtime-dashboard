<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Connect 坐席指标看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 24px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 1.4rem; font-weight: 600; color: #fff; }
    .status-bar { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; color: #94a3b8; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
    .status-dot.error { background: #ef4444; animation: none; }
    .status-dot.loading { background: #f59e0b; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .config-panel { background: #1e2130; border: 1px solid #2d3348; border-radius: 10px; padding: 20px; margin-bottom: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .credential-section { background: #1e2130; border: 1px solid #2d3348; border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
    .credential-toggle { width: 100%; background: #252a3d; border: none; color: #94a3b8; padding: 12px 20px; text-align: left; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: space-between; transition: background 0.2s; }
    .credential-toggle:hover { background: #2d3348; }
    .credential-toggle .toggle-icon { transition: transform 0.25s; font-size: 0.75rem; }
    .credential-toggle.open .toggle-icon { transform: rotate(180deg); }
    .credential-body { display: none; padding: 20px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .credential-body.open { display: grid; }
    .config-panel label, .credential-body label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .config-panel input, .credential-body input { width: 100%; background: #0f1117; border: 1px solid #2d3348; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .config-panel input:focus, .credential-body input:focus { border-color: #6366f1; }
    .btn { padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-row { display: flex; align-items: flex-end; gap: 10px; }
    #countdown { font-size: 0.85rem; color: #64748b; }
    #metrics-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }
    .agent-card { background: #1e2130; border: 1px solid #2d3348; border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
    .agent-card:hover { border-color: #6366f1; }
    .agent-card-header { background: #252a3d; padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
    .agent-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
    .agent-id { font-size: 0.8rem; color: #94a3b8; word-break: break-all; }
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #2d3348; }
    .metric-cell { background: #1e2130; padding: 12px 16px; }
    .metric-label { font-size: 0.72rem; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .metric-value { font-size: 1.15rem; font-weight: 600; color: #e2e8f0; }
    .metric-value.highlight { color: #6366f1; }
    .metric-value.warn { color: #f59e0b; }
    .metric-value.na { color: #475569; font-size: 0.9rem; }
    .empty-state, .error-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #475569; }
    .error-state { color: #ef4444; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #2d3348; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 坐席实时状态面板 */
    .agent-status-panel { background: #1e2130; border: 1px solid #2d3348; border-radius: 10px; margin-bottom: 24px; overflow: hidden; }
    .agent-status-panel .panel-header { background: #252a3d; padding: 12px 18px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .agent-status-panel .panel-header .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    .agent-status-list { max-height: 260px; overflow-y: auto; padding: 12px 18px; }
    .agent-status-list::-webkit-scrollbar { width: 6px; }
    .agent-status-list::-webkit-scrollbar-track { background: #1e2130; }
    .agent-status-list::-webkit-scrollbar-thumb { background: #3d4460; border-radius: 3px; }
    .agent-status-list::-webkit-scrollbar-thumb:hover { background: #6366f1; }
    .status-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .status-table th { text-align: left; color: #64748b; font-weight: 500; padding: 6px 10px; text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.04em; border-bottom: 1px solid #2d3348; position: sticky; top: 0; background: #1e2130; z-index: 1; }
    .status-table td { padding: 8px 10px; border-bottom: 1px solid #1a1d2e; }
    .status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: 500; }
    .status-badge.available { background: rgba(34,197,94,0.15); color: #22c55e; }
    .status-badge.offline { background: rgba(100,116,139,0.2); color: #94a3b8; }
    .status-badge.busy { background: rgba(239,68,68,0.15); color: #ef4444; }
    .status-badge.other { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .status-empty { text-align: center; padding: 24px; color: #475569; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>Amazon Connect 坐席指标看板</h1>
  <div class="status-bar">
    <span><span class="status-dot" id="status-dot"></span><span id="status-text">等待启动</span></span>
    <span id="last-updated"></span>
    <span id="countdown"></span>
  </div>
</header>

<div class="config-panel">
  <div><label>AWS 区域</label><input id="cfg-region" value="us-east-1" placeholder="us-east-1" /></div>
  <div><label>Connect 实例 ID</label><input id="cfg-instance-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" /></div>
  <div><label>AWS Account ID</label><input id="cfg-account-id" placeholder="123456789012" /></div>
  <div><label>查询时间范围（小时）</label><input id="cfg-hours" type="number" value="8" min="1" max="168" /></div>
  <div><label>刷新周期（秒）</label><input id="cfg-interval" type="number" value="15" min="5" max="3600" /></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-start">启动</button>
    <button class="btn btn-danger" id="btn-stop">停止</button>
  </div>
</div>

<div class="credential-section">
  <button class="credential-toggle" id="cred-toggle">
    <span>🔑 AWS Credential 配置</span>
    <span class="toggle-icon">▼</span>
  </button>
  <div class="credential-body" id="cred-body">
    <div><label>AWS Access Key ID</label><input id="cfg-access-key" type="password" placeholder="AKIA..." /></div>
    <div><label>AWS Secret Access Key</label><input id="cfg-secret-key" type="password" placeholder="Secret..." /></div>
  </div>
</div>

<div class="agent-status-panel" id="agent-status-panel" style="display:none;">
  <div class="panel-header"><span class="live-dot"></span>坐席实时状态</div>
  <div class="agent-status-list" id="agent-status-list">
    <div class="status-empty">等待数据...</div>
  </div>
</div>

<div id="metrics-container">
  <div class="empty-state">配置参数后点击「启动」开始获取坐席指标</div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
